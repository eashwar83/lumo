name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-release:
    name: Build macOS DMG (${{ matrix.runner_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    permissions:
      contents: read
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      SOIA_API: ${{ secrets.SOIA_API }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            runner_label: macos-15
            arch: arm64
            deployment_target: "15.0"
            package_suffix: macOS-arm64
          - runner: macos-15-intel
            runner_label: macos-15-intel
            arch: x64
            deployment_target: "15.0"
            package_suffix: macOS-x64
    steps:
      - uses: actions/checkout@v6

      - name: Build Soia App (shared steps)
        uses: ./.github/actions/release-build-macos
        with:
          arch: ${{ matrix.arch }}
          deployment_target: ${{ matrix.deployment_target }}
          github_token: ${{ github.token }}

      - name: Prepare release assets
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for updater signatures" >&2
            exit 1
          fi

          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          DMG_COUNT="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d '[:space:]')"
          if [ "$DMG_COUNT" -eq 0 ]; then
            echo "No .dmg found under src-tauri/target/release/bundle/dmg" >&2
            exit 1
          fi
          if [ "$DMG_COUNT" -ne 1 ]; then
            printf 'Expected exactly one .dmg, found %s:\n' "$DMG_COUNT" >&2
            find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | sort >&2
            exit 1
          fi
          DMG_SOURCE="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | sort | head -n 1)"
          DMG_TARGET="release/Soia-${TAG}-${{ matrix.package_suffix }}.dmg"
          cp "$DMG_SOURCE" "$DMG_TARGET"
          shasum -a 256 "$DMG_TARGET" > "${DMG_TARGET}.sha256"

          APP_TAR_TARGET="release/Soia-${TAG}-${{ matrix.package_suffix }}.app.tar.gz"
          tar -C src-tauri/target/release/bundle/macos -czf "$APP_TAR_TARGET" Soia.app
          pnpm tauri signer sign "$APP_TAR_TARGET"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: soia-release-${{ github.ref_name }}-${{ matrix.arch }}
          path: release/*
          compression-level: 0

  windows-release:
    name: Build Windows Packages
    runs-on: windows-2022
    timeout-minutes: 50
    permissions:
      contents: read
    env:
      SOIA_API: ${{ secrets.SOIA_API }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Build Soia Windows bundle (shared steps)
        uses: ./.github/actions/release-build-windows
        with:
          github_token: ${{ github.token }}

      - name: Prepare release assets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for updater signatures"
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          $tag = "${{ github.ref_name }}"
          $sources = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe"
          if ($sources.Count -eq 0) {
            throw "No NSIS installer found under src-tauri/target/release/bundle/nsis"
          }
          if ($sources.Count -ne 1) {
            $names = ($sources | Select-Object -ExpandProperty FullName) -join "`n"
            throw "Expected exactly one NSIS installer, found $($sources.Count):`n$names"
          }
          $source = $sources[0]
          $target = "release/Soia-$tag-Windows-x64-setup.exe"
          Copy-Item $source.FullName $target
          $hash = (Get-FileHash -Path $target -Algorithm SHA256).Hash.ToLower()
          "$hash  $([System.IO.Path]::GetFileName($target))" | Set-Content -Path "$target.sha256" -NoNewline
          pnpm tauri signer sign $target

          $portableTarget = "release/Soia-$tag-Windows-x64-portable.zip"
          $portableStaging = "release/portable"
          if (Test-Path $portableStaging) {
            Remove-Item -Path $portableStaging -Recurse -Force
          }
          New-Item -ItemType Directory -Path $portableStaging -Force | Out-Null

          $portableCandidates = @()
          if (Test-Path "src-tauri/target/release/bundle") {
            $portableCandidates = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File -Filter "*.exe" |
              Where-Object { $_.Name -notmatch "(?i)(setup|installer|uninstall)" }
          }

          if ($portableCandidates.Count -gt 0) {
            $portableExe = $portableCandidates |
              Sort-Object @{ Expression = { if ($_.Name -ieq "Soia.exe") { 0 } else { 1 } } }, FullName |
              Select-Object -First 1
            $portableSourceDir = $portableExe.DirectoryName
            Get-ChildItem -Path $portableSourceDir | ForEach-Object {
              if ($_.PSIsContainer) {
                Copy-Item -Path $_.FullName -Destination $portableStaging -Recurse -Force
                return
              }
              if ($_.Name -match "(?i)(setup|installer|uninstall)") {
                return
              }
              if ($_.Extension -ieq ".msi") {
                return
              }
              Copy-Item -Path $_.FullName -Destination $portableStaging -Force
            }
          } else {
            $portableExePath = "src-tauri/target/release/Soia.exe"
            if (-not (Test-Path $portableExePath)) {
              throw "Portable executable not found at $portableExePath"
            }
            Copy-Item -Path $portableExePath -Destination $portableStaging -Force
            Get-ChildItem -Path "src-tauri/target/release" -File -Filter "*.dll" |
              ForEach-Object { Copy-Item -Path $_.FullName -Destination $portableStaging -Force }
          }

          "portable" | Set-Content -Path "$portableStaging/marker.dll" -NoNewline
          Compress-Archive -Path "$portableStaging/*" -DestinationPath $portableTarget -Force
          Remove-Item -Path $portableStaging -Recurse -Force
          $portableHash = (Get-FileHash -Path $portableTarget -Algorithm SHA256).Hash.ToLower()
          "$portableHash  $([System.IO.Path]::GetFileName($portableTarget))" | Set-Content -Path "$portableTarget.sha256" -NoNewline
          pnpm tauri signer sign $portableTarget

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: soia-release-${{ github.ref_name }}-windows-x64
          path: release/*
          compression-level: 0

  linux-release:
    name: Build Linux Wayland Bundles (${{ matrix.package_arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            package_arch: x64
          - runner: ubuntu-24.04-arm
            package_arch: arm64
    env:
      SOIA_API: ${{ secrets.SOIA_API }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Build Soia Linux bundles (shared steps)
        uses: ./.github/actions/release-build-linux
        with:
          github_token: ${{ github.token }}

      - name: Prepare release assets
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for updater signatures" >&2
            exit 1
          fi

          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          DEB_COUNT="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d '[:space:]')"
          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "No .deb found under src-tauri/target/release/bundle/deb" >&2
            exit 1
          fi
          if [ "$DEB_COUNT" -ne 1 ]; then
            printf 'Expected exactly one .deb, found %s:\n' "$DEB_COUNT" >&2
            find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | sort >&2
            exit 1
          fi
          DEB_SOURCE="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | sort | head -n 1)"
          DEB_TARGET="release/Soia-${TAG}-Linux-${{ matrix.package_arch }}-wayland.deb"
          cp "$DEB_SOURCE" "$DEB_TARGET"
          shasum -a 256 "$DEB_TARGET" > "${DEB_TARGET}.sha256"
          pnpm tauri signer sign "$DEB_TARGET"

          APPIMAGE_COUNT="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.appimage' \) | wc -l | tr -d '[:space:]')"
          if [ "$APPIMAGE_COUNT" -eq 0 ]; then
            echo "No AppImage found under src-tauri/target/release/bundle/appimage" >&2
            exit 1
          fi
          if [ "$APPIMAGE_COUNT" -ne 1 ]; then
            printf 'Expected exactly one AppImage, found %s:\n' "$APPIMAGE_COUNT" >&2
            find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.appimage' \) | sort >&2
            exit 1
          fi
          APPIMAGE_SOURCE="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.appimage' \) | sort | head -n 1)"
          APPIMAGE_TARGET="release/Soia-${TAG}-Linux-${{ matrix.package_arch }}-wayland.AppImage"
          cp "$APPIMAGE_SOURCE" "$APPIMAGE_TARGET"
          shasum -a 256 "$APPIMAGE_TARGET" > "${APPIMAGE_TARGET}.sha256"
          pnpm tauri signer sign "$APPIMAGE_TARGET"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: soia-release-${{ github.ref_name }}-linux-${{ matrix.package_arch }}-wayland
          path: release/*
          compression-level: 0

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      SOIA_API: ${{ secrets.SOIA_API }}
    needs:
      - macos-release
      - windows-release
      - linux-release
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: soia-release-${{ github.ref_name }}-*
          merge-multiple: true
          path: release

      - name: Generate updater latest.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          MAC_ARM_FILE="Soia-${TAG}-macOS-arm64.app.tar.gz"
          MAC_X64_FILE="Soia-${TAG}-macOS-x64.app.tar.gz"
          WIN_X64_FILE="Soia-${TAG}-Windows-x64-setup.exe"
          LINUX_X64_FILE="Soia-${TAG}-Linux-x64-wayland.deb"
          LINUX_ARM_FILE="Soia-${TAG}-Linux-arm64-wayland.deb"

          for sig in \
            "release/${MAC_ARM_FILE}.sig" \
            "release/${MAC_X64_FILE}.sig" \
            "release/${WIN_X64_FILE}.sig" \
            "release/${LINUX_X64_FILE}.sig" \
            "release/${LINUX_ARM_FILE}.sig"; do
            if [ ! -f "$sig" ]; then
              echo "Missing signature file: $sig" >&2
              exit 1
            fi
          done

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release ${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_arm_url "${BASE_URL}/${MAC_ARM_FILE}" \
            --arg mac_x64_url "${BASE_URL}/${MAC_X64_FILE}" \
            --arg win_x64_url "${BASE_URL}/${WIN_X64_FILE}" \
            --arg linux_x64_url "${BASE_URL}/${LINUX_X64_FILE}" \
            --arg linux_arm_url "${BASE_URL}/${LINUX_ARM_FILE}" \
            --rawfile mac_arm_sig "release/${MAC_ARM_FILE}.sig" \
            --rawfile mac_x64_sig "release/${MAC_X64_FILE}.sig" \
            --rawfile win_x64_sig "release/${WIN_X64_FILE}.sig" \
            --rawfile linux_x64_sig "release/${LINUX_X64_FILE}.sig" \
            --rawfile linux_arm_sig "release/${LINUX_ARM_FILE}.sig" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "windows-x86_64": { signature: $win_x64_sig, url: $win_x64_url },
                "linux-x86_64": { signature: $linux_x64_sig, url: $linux_x64_url },
                "linux-aarch64": { signature: $linux_arm_sig, url: $linux_arm_url }
              }
            }' > release/latest.json

      - name: Generate release body
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          MAC_ARM_DMG="Soia-${TAG}-macOS-arm64.dmg"
          MAC_X64_DMG="Soia-${TAG}-macOS-x64.dmg"
          WIN_X64_SETUP="Soia-${TAG}-Windows-x64-setup.exe"
          WIN_X64_PORTABLE="Soia-${TAG}-Windows-x64-portable.zip"
          LINUX_X64_DEB="Soia-${TAG}-Linux-x64-wayland.deb"
          LINUX_X64_APPIMAGE="Soia-${TAG}-Linux-x64-wayland.AppImage"
          LINUX_ARM_DEB="Soia-${TAG}-Linux-arm64-wayland.deb"
          LINUX_ARM_APPIMAGE="Soia-${TAG}-Linux-arm64-wayland.AppImage"

          : > release/RELEASE_BODY.md

          if [ -f RELEASE_NOTES.md ]; then
            cat RELEASE_NOTES.md >> release/RELEASE_BODY.md
            printf "\n\n---\n\n" >> release/RELEASE_BODY.md
          fi

          {
            echo "# Downloads"
            echo
            echo "Choose your platform and download directly:"
            echo
            echo "| Platform | Download |"
            echo "| --- | --- |"
            echo "| macOS (Apple silicon) | [\`${MAC_ARM_DMG}\`](${BASE_URL}/${MAC_ARM_DMG}) |"
            echo "| macOS (Intel) | [\`${MAC_X64_DMG}\`](${BASE_URL}/${MAC_X64_DMG}) |"
            echo "| Windows (x64, Installer) | [\`${WIN_X64_SETUP}\`](${BASE_URL}/${WIN_X64_SETUP}) |"
            echo "| Linux (x64, Wayland, DEB) | [\`${LINUX_X64_DEB}\`](${BASE_URL}/${LINUX_X64_DEB}) |"
            echo "| Linux (arm64, Wayland, DEB) | [\`${LINUX_ARM_DEB}\`](${BASE_URL}/${LINUX_ARM_DEB}) |"
            echo
            echo "## Experimental Downloads"
            echo
            echo "> Windows Portable and Linux AppImage are currently experimental."
            echo
            echo "| Platform | Download |"
            echo "| --- | --- |"
            echo "| Windows (x64, Portable) | [\`${WIN_X64_PORTABLE}\`](${BASE_URL}/${WIN_X64_PORTABLE}) |"
            echo "| Linux (x64, Wayland) | [\`${LINUX_X64_APPIMAGE}\`](${BASE_URL}/${LINUX_X64_APPIMAGE}) |"
            echo "| Linux (arm64, Wayland) | [\`${LINUX_ARM_APPIMAGE}\`](${BASE_URL}/${LINUX_ARM_APPIMAGE}) |"
          } >> release/RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.app.tar.gz
            release/*.exe
            release/*.zip
            release/*.deb
            release/*.AppImage
            release/*.sig
            release/*.sha256
            release/latest.json
          body_path: release/RELEASE_BODY.md
