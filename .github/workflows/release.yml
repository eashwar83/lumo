name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-release:
    name: Build macOS DMG (${{ matrix.runner_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    permissions:
      contents: read
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      SOIA_API_URL: ${{ secrets.SOIA_API_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            runner_label: macos-15
            arch: arm64
            deployment_target: "15.0"
            package_suffix: macOS-arm64
          - runner: macos-15-intel
            runner_label: macos-15-intel
            arch: x64
            deployment_target: "15.0"
            package_suffix: macOS-x64
    steps:
      - uses: actions/checkout@v6

      - name: Build Soia App (shared steps)
        uses: ./.github/actions/macos-build-soia
        with:
          arch: ${{ matrix.arch }}
          deployment_target: ${{ matrix.deployment_target }}
          github_token: ${{ github.token }}

      - name: Prepare release assets
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for updater signatures" >&2
            exit 1
          fi

          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          DMG_SOURCE="$(ls -1 src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)"
          DMG_TARGET="release/Soia-${TAG}-${{ matrix.package_suffix }}.dmg"
          cp "$DMG_SOURCE" "$DMG_TARGET"
          shasum -a 256 "$DMG_TARGET" > "${DMG_TARGET}.sha256"

          APP_TAR_TARGET="release/Soia-${TAG}-${{ matrix.package_suffix }}.app.tar.gz"
          tar -C src-tauri/target/release/bundle/macos -czf "$APP_TAR_TARGET" Soia.app
          pnpm tauri signer sign "$APP_TAR_TARGET"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: soia-release-${{ github.ref_name }}-${{ matrix.arch }}
          path: release/*

  windows-release:
    name: Build Windows NSIS
    runs-on: windows-latest
    timeout-minutes: 50
    permissions:
      contents: read
    env:
      SOIA_API_URL: ${{ secrets.SOIA_API_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare runtime libs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm setup:libs

      - name: Build Windows NSIS bundle
        run: pnpm tauri build --bundles nsis

      - name: Prepare release assets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for updater signatures"
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          $tag = "${{ github.ref_name }}"
          $source = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $source) {
            throw "No NSIS installer found under src-tauri/target/release/bundle/nsis"
          }
          $target = "release/Soia-$tag-Windows-x64-setup.exe"
          Copy-Item $source.FullName $target
          $hash = (Get-FileHash -Path $target -Algorithm SHA256).Hash.ToLower()
          "$hash  $([System.IO.Path]::GetFileName($target))" | Set-Content -Path "$target.sha256" -NoNewline
          pnpm tauri signer sign $target

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: soia-release-${{ github.ref_name }}-windows-x64
          path: release/*

  linux-release:
    name: Build Linux Wayland Bundles
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SOIA_API_URL: ${{ secrets.SOIA_API_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare runtime libs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm setup:libs

      - name: Build Linux bundles (Wayland)
        run: pnpm bundle:linux:release

      - name: Prepare release assets
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for updater signatures" >&2
            exit 1
          fi

          mkdir -p release
          TAG="${GITHUB_REF_NAME}"
          DEB_SOURCE="$(ls -1 src-tauri/target/release/bundle/deb/*.deb | head -n 1)"
          DEB_TARGET="release/Soia-${TAG}-Linux-x64-wayland.deb"
          cp "$DEB_SOURCE" "$DEB_TARGET"
          shasum -a 256 "$DEB_TARGET" > "${DEB_TARGET}.sha256"
          pnpm tauri signer sign "$DEB_TARGET"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: soia-release-${{ github.ref_name }}-linux-x64-wayland
          path: release/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      SOIA_API_URL: ${{ secrets.SOIA_API_URL }}
    needs:
      - macos-release
      - windows-release
      - linux-release
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: soia-release-${{ github.ref_name }}-*
          merge-multiple: true
          path: release

      - name: Generate updater latest.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          MAC_ARM_FILE="Soia-${TAG}-macOS-arm64.app.tar.gz"
          MAC_X64_FILE="Soia-${TAG}-macOS-x64.app.tar.gz"
          WIN_X64_FILE="Soia-${TAG}-Windows-x64-setup.exe"
          LINUX_X64_FILE="Soia-${TAG}-Linux-x64-wayland.deb"

          for sig in \
            "release/${MAC_ARM_FILE}.sig" \
            "release/${MAC_X64_FILE}.sig" \
            "release/${WIN_X64_FILE}.sig" \
            "release/${LINUX_X64_FILE}.sig"; do
            if [ ! -f "$sig" ]; then
              echo "Missing signature file: $sig" >&2
              exit 1
            fi
          done

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release ${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg mac_arm_url "${BASE_URL}/${MAC_ARM_FILE}" \
            --arg mac_x64_url "${BASE_URL}/${MAC_X64_FILE}" \
            --arg win_x64_url "${BASE_URL}/${WIN_X64_FILE}" \
            --arg linux_x64_url "${BASE_URL}/${LINUX_X64_FILE}" \
            --rawfile mac_arm_sig "release/${MAC_ARM_FILE}.sig" \
            --rawfile mac_x64_sig "release/${MAC_X64_FILE}.sig" \
            --rawfile win_x64_sig "release/${WIN_X64_FILE}.sig" \
            --rawfile linux_x64_sig "release/${LINUX_X64_FILE}.sig" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "windows-x86_64": { signature: $win_x64_sig, url: $win_x64_url },
                "linux-x86_64": { signature: $linux_x64_sig, url: $linux_x64_url }
              }
            }' > release/latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: CHANGELOG.md
