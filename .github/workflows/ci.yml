name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - ci

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build frontend
        run: pnpm build

  backend-check:
    name: Backend Check (${{ matrix.runner_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            runner_label: macos-15
            arch: arm64
            deployment_target: "15.0"
          - runner: macos-15-intel
            runner_label: macos-15-intel
            arch: x64
            deployment_target: "15.0"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Prepare stub runtime libs for build.rs/tauri checks
        run: |
          mkdir -p src-tauri/libs/mpv
          touch src-tauri/libs/mpv/libmpv.2.dylib
          ln -sf libmpv.2.dylib src-tauri/libs/mpv/libmpv.dylib
          touch src-tauri/libs/mpv/libsoia_utils.dylib

      - name: Cargo check backend
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  macos-smoke-build:
    name: macOS Smoke Build (${{ matrix.runner_label }})
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/ci' }}
    needs:
      - frontend-check
      - backend-check
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            runner_label: macos-15
            arch: arm64
            deployment_target: "15.0"
          - runner: macos-15-intel
            runner_label: macos-15-intel
            arch: x64
            deployment_target: "15.0"
    steps:
      - uses: actions/checkout@v6

      - name: Build Soia App (shared steps)
        uses: ./.github/actions/macos-build-soia
        with:
          arch: ${{ matrix.arch }}
          deployment_target: ${{ matrix.deployment_target }}
          github_token: ${{ github.token }}

      - name: Upload DMG artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soia-dmg-macos-${{ matrix.arch }}-smoke
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
          retention-days: 14

  linux-smoke-build:
    name: Linux Smoke Build (Wayland x64)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/ci' }}
    needs:
      - frontend-check
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare runtime libs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm setup:libs

      - name: Build Linux bundles (Wayland)
        run: pnpm bundle:linux:release

      - name: Prepare smoke assets
        run: |
          set -euo pipefail
          mkdir -p smoke
          DEB_SOURCE="$(ls -1 src-tauri/target/release/bundle/deb/*.deb | head -n 1)"
          cp "$DEB_SOURCE" "smoke/Soia-ci-Linux-x64-Wayland.deb"

      - name: Upload Linux smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soia-linux-wayland-x64-smoke
          path: smoke/*
          if-no-files-found: ignore
          retention-days: 14
