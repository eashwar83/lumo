name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  push:
    branches:
      - main
      - ci
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-24.04
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      smoke: ${{ steps.filter.outputs.smoke }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
              - '.github/workflows/ci.yml'
            backend:
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            smoke:
              - 'src/**'
              - 'public/**'
              - 'src-tauri/**'
              - 'index.html'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-24.04
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    timeout-minutes: 15
    env:
      SOIA_API: ${{ secrets.SOIA_API }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build frontend
        run: pnpm build

  backend-check:
    name: Backend Check
    runs-on: macos-15
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    timeout-minutes: 20
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      SOIA_API: ${{ secrets.SOIA_API }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Prepare stub runtime libs for build.rs/tauri checks
        run: |
          mkdir -p src-tauri/libs/mpv
          touch src-tauri/libs/mpv/libmpv.2.dylib
          ln -sf libmpv.2.dylib src-tauri/libs/mpv/libmpv.dylib
          touch src-tauri/libs/mpv/libsoia_utils.dylib

      - name: Cargo check backend
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  macos-smoke-build:
    name: macOS Smoke Build (${{ matrix.runner_label }})
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/ci' && needs.changes.outputs.smoke == 'true' && contains(fromJson('["success","skipped"]'), needs.frontend-check.result) && contains(fromJson('["success","skipped"]'), needs.backend-check.result) }}
    needs:
      - changes
      - frontend-check
      - backend-check
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      SOIA_API: ${{ secrets.SOIA_API }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            runner_label: macos-15
            arch: arm64
            deployment_target: "13.0"
          - runner: macos-15
            runner_label: macos-15 (x64-cross)
            arch: x64
            deployment_target: "13.0"
    steps:
      - uses: actions/checkout@v6

      - name: Build Soia App (shared steps)
        uses: ./.github/actions/release-build-macos
        with:
          arch: ${{ matrix.arch }}
          deployment_target: ${{ matrix.deployment_target }}
          github_token: ${{ github.token }}

      - name: Upload DMG artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soia-dmg-macos-${{ matrix.arch }}-smoke
          path: src-tauri/target/release/bundle/dmg/*.dmg
          compression-level: 0
          if-no-files-found: ignore
          retention-days: 14
